.ic{position:absolute;top:50%;left:14px;transform:translateY(-50%);color:#64748b;font-size:18px}

.dv{text-align:center;color:#64748b;margin:18px 0;font-size:13px;position:relative}

.cks{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}

.st{margin-bottom:10px;font-size:13px;color:#facc15;font-weight:600}
.si{font-size:12px;color:#cbd5e1;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.mh{margin-top:10px;font-size:13px;display:none}
.mh.ok{color:#4ade80}.mh.no{color:#f87171}

    <div class="dv">或</div>

    <div class="dv">或</div>
    <button class="btn bg" onclick="go('li')">← 返回登入</button>
  </div>

      <div class="info-box" id="da-info"></div>
    </div>
  </div>
</div>

const SEQ=/(012|123|234|345|456|567|678|789|890|abc|bcd|cde|def|efg|fgh|ghi|hij|ijk|jkl|klm|lmn|mno|nop|opq|pqr|qrs|rst|stu|tuv|uvw|vwx|wxy|xyz|qwe|wer|ert|rty|tyu|yui|uio|iop|asd|sdf|dfg|ghj|hjk|zxc|xcv|cvb|vbn|bnm)/i;
const CK_LABELS=['長度 ≥ 8','長度 ≥ 12','小寫字母','大寫字母','數字','特殊符號','無重複字元','無連續字串','非常見密碼'];
const TIPS=['密碼至少需要 8 個字元','建議延長至 12 個字元以上','加入小寫字母（a-z）','加入大寫字母（A-Z）','加入數字（0-9）','加入特殊符號（!@#$%...）','避免連續重複相同字元','避免鍵盤連續字串（如 qwerty）','此為常見密碼，請更換'];
const CAT_LABEL={numbers:'純數字組合',keyboard:'鍵盤連續字串',common:'常見密碼',names:'人名/單字',patterns:'變形模式'};

// 動態產生密碼強度面板 DOM（首次呼叫時初始化，避免 HTML 重複）
function initSW(id){
  const el=$(id); if(el.dataset.init)return;
  el.innerHTML=`<div class="sr"><span class="slb" id="sl${id}">請輸入密碼</span><span class="snum" id="sn${id}">0/100 分</span></div><div class="pt"><div class="pf" id="pf${id}"></div></div><div class="cks" id="cks${id}"></div><div class="sgw" id="sg${id}"><div class="st">改善建議</div><div id="sl2${id}"></div></div>`;
  $('cks'+id).innerHTML=CK_LABELS.map((l,i)=>`<span class="ck" id="ck${id}${i}"><i class="ti ti-circle"></i>${l}</span>`).join('');
  el.dataset.init=1;
}
// 計算密碼強度分數（0–100）與 9 項條件布林陣列
function calc(v){
  const r=[v.length>=8,v.length>=12,/[a-z]/.test(v),/[A-Z]/.test(v),/\d/.test(v),/[^A-Za-z0-9]/.test(v),!/(.).*\1{2,}/.test(v),!SEQ.test(v),!COM.includes(v.toLowerCase())];
  let s=r.reduce((a,ok,i)=>a+([15,15,10,10,10,15,5,5,5][i]*(ok?1:0)),0);
  if(v.length>=16)s+=10; if(new Set(v).size/v.length>0.7)s+=5;
  return{s:Math.min(100,s),r};
}
// 密碼輸入時即時更新強度面板（k='A' 建立帳號 / 'B' 重設密碼）
function rs(inp,k){
  const v=inp.value,sw=$('sw'+k);
  if(!v){sw.style.display='none';score[k]=0;chk();chkR();return;}
  initSW('sw'+k); sw.style.display='block';
  const{s,r}=calc(v); score[k]=s;
  const lv=s<40?'l1':s<70?'l2':'l3';
  $('slsw'+k).textContent={l1:'弱 ⚠',l2:'中 ◑',l3:'強 ✓'}[lv];
  $('slsw'+k).className='slb '+lv;
  $('snsw'+k).textContent=s+'/100 分';
  const pf=$('pfsw'+k); pf.style.width=s+'%'; pf.className='pf '+lv;
  r.forEach((ok,i)=>{const e=$('cksw'+k+i);e.className='ck '+(ok?'ok':'bad');e.querySelector('i').className=ok?'ti ti-check':'ti ti-x';});
  const sg=[];
  if(!r[0])sg.push(TIPS[0]);else if(!r[1])sg.push(TIPS[1]);
  [2,3,4,5,6,7,8].forEach(i=>{if(!r[i])sg.push(TIPS[i]);});
  $('sgsw'+k).style.display=sg.length?'block':'none';
  $('sl2sw'+k).innerHTML=sg.map(t=>`<div class="si"><i class="ti ti-bulb"></i>${t}</div>`).join('');
  chk();chkR();
}
// 比對兩次密碼是否一致，顯示相符／不相符提示
function mp(a,b,m){const p1=$(a).value,p2=$(b).value,el=$(m);if(!p2){el.style.display='none';return;}el.style.display='block';const ok=p1===p2;el.textContent=ok?'✓ 密碼相符':'✗ 密碼不相符';el.className=ok?'mh ok':'mh no';}
// 切換密碼欄位顯示／隱藏
function ep(id,b){const e=$(id),s=e.type==='password';e.type=s?'text':'password';b.querySelector('i').className=s?'ti ti-eye-off':'ti ti-eye';}
// 切換頁籤並隱藏 Toast
function go(t){document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',i===({li:0,rg:1,sa:2}[t]??-1)));document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));$(t).classList.add('on');$('tk').style.display='none';}
// 顯示 Toast 通知（ok／err／info），成功訊息 5 秒後自動消失
function toast(m,t){const e=$('tk');e.textContent=m;e.className=t;e.style.display='block';if(t==='ok')setTimeout(()=>e.style.display='none',5000);}
// 產生 10 碼隨機臨時密碼（排除易混淆字元）
function randPw(){const c='ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#$%';return Array.from({length:10},()=>c[Math.random()*c.length|0]).join('');}
// 計算 Shannon 熵值（bits）：反映密碼資訊量，越高越難猜
function entropy(pw){const f={};for(const c of pw)f[c]=(f[c]||0)+1;const n=pw.length;return -Object.values(f).reduce((s,v)=>{const p=v/n;return s+p*Math.log2(p);},0)*n;}
// 將熵值轉換為人類可讀的理論破解時間（假設每秒 100 億次）
function crackTime(b){const s=Math.pow(2,b)/1e10;if(s<.001)return '瞬間';if(s<1)return (s*1000).toFixed(1)+' 毫秒';if(s<60)return s.toFixed(1)+' 秒';if(s<3600)return (s/60).toFixed(1)+' 分鐘';if(s<86400)return (s/3600).toFixed(1)+' 小時';if(s<31536000)return (s/86400).toFixed(0)+' 天';if(s<3153600000)return (s/31536000).toFixed(0)+' 年';return '> 百億年';}
// 估算密碼字元集大小（小寫26＋大寫26＋數字10＋符號32）
function csSize(pw){let s=0;if(/[a-z]/.test(pw))s+=26;if(/[A-Z]/.test(pw))s+=26;if(/\d/.test(pw))s+=10;if(/[^a-zA-Z0-9]/.test(pw))s+=32;return s||10;}
// 產生臨時密碼並透過 EmailJS 寄送，登入後強制重設
async function forgotPw(){
  const email=val('fe');
  if(!email.includes('@'))return toast('請輸入有效的 Email','err');
  const btn=$('fpbtn');
  btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2" style="font-size:14px;vertical-align:-1px;margin-right:6px"></i>寄送中…';
  toast('正在寄送臨時密碼…','info');
  const tmp=randPw();
  const found=Object.keys(db).find(u=>db[u].e===email);
  if(found){db[found].p=tmp;db[found].tmp=true;}else{db['__'+email]={e:email,p:tmp,tmp:true};}
  try{
    await emailjs.send(SVC,TPL,{to_email:email,user:email,temp_pass:tmp});
    toast('✓ 臨時密碼已寄至 '+email,'ok');
    setTimeout(()=>{$('fe').value='';go('li');},3000);
  }catch(e){toast('❌ 寄送失敗：'+(e.text||e.message||JSON.stringify(e)),'err');}
  finally{btn.disabled=false;btn.innerHTML='<i class="ti ti-send" style="font-size:14px;vertical-align:-1px;margin-right:6px"></i>寄送臨時密碼';}
}
// 驗證帳號密碼；若為臨時密碼則強制跳轉重設頁
function login(){
  const u=val('lu'),p=$('lp').value;
  if(!u||!p)return toast('請填寫帳號與密碼','err');
  const key=db[u]?u:Object.keys(db).find(k=>db[k].e===u);
  if(!key||db[key].p!==p)return toast('帳號或密碼錯誤','err');
  if(db[key].tmp){
    curUser=key;$('np').value='';$('np2').value='';
    $('swB').style.display='none';$('mhB').style.display='none';
    score.B=0;$('rb2').disabled=true;
    toast('⚠ 請立即設定新密碼','info');go('rp_sec');
  }else toast('登入成功！歡迎 '+key,'ok');
}
// 確認新密碼填寫完整且強度 ≥ 40 分，才啟用「確認更新」按鈕
function chkR(){const p1=$('np').value,p2=$('np2').value;$('rb2').disabled=!(p1&&p2&&p1===p2&&score.B>=40);}
// 將新密碼寫入 db，清除臨時標記，返回登入頁
function doReset(){
  if(!curUser)return toast('請重新登入','err');
  db[curUser].p=$('np').value;db[curUser].tmp=false;
  toast('✓ 密碼已更新！請重新登入','ok');curUser=null;
  setTimeout(()=>{$('np').value='';$('np2').value='';$('lp').value='';go('li');},1500);
}
// 確認所有欄位填寫且密碼強度 ≥ 40 分，才啟用「建立帳號」按鈕
function chk(){const p1=$('rp').value,p2=$('rp2').value;$('rb').disabled=!(val('ru')&&val('re')&&p1&&p2&&p1===p2&&score.A>=40);}
// 驗證表單並將帳號存入 db，成功後自動跳回登入頁
function reg(){
  const u=val('ru'),e=val('re'),p=$('rp').value;
  if(!e.includes('@'))return toast('請輸入有效 Email','err');
  if(db[u])return toast('此帳號已存在','err');
  if(score.A<40)return toast('密碼強度不足','err');
  db[u]={e,p,tmp:false};toast('帳號建立成功！','ok');
  setTimeout(()=>{['ru','re','rp','rp2'].forEach(id=>$(id).value='');$('swA').style.display='none';$('mhA').style.display='none';score.A=0;go('li');$('lu').value=u;},1200);
}
const S=id=>$('s-'+id);
// 清除字典攻擊面板的日誌與所有統計數值
function daReset(){
  clearInterval(daTimer);
  $('da-log').innerHTML='<span style="color:#334155">等待輸入密碼…</span>';
  $('da-res').style.display='none';$('da-info').style.display='none';
  ['cnt','spd','time','pct','rank','total','char','ent','threat','est'].forEach(k=>S(k).textContent=k==='cnt'?'0':k==='pct'?'0%':'—');
  $('da-go').disabled=false;
}
// 啟動字典攻擊模擬：每批 5 筆、每 50ms 執行，命中時顯示風險分析
function startDA(){
  const pw=$('da-pw').value.trim();
  if(!pw)return;
  clearInterval(daTimer);
  const log=$('da-log'),res=$('da-res'),info=$('da-info');
  log.innerHTML='';res.style.display='none';info.style.display='none';
  $('da-go').disabled=true;
  const dict=[...new Set(COM)];
  const cs=csSize(pw),ent=entropy(pw),ct=crackTime(ent),ur=(new Set(pw).size/pw.length*100).toFixed(0);
  S('total').textContent=dict.length; S('char').textContent=cs+'種';
  S('ent').textContent=ent.toFixed(1)+' bits'; S('est').textContent=ct;
  let i=0,found=false;
  const t0=performance.now();
  daTimer=setInterval(()=>{
    for(let b=0;b<5&&i<dict.length;b++,i++){
      const w=dict[i],hit=w.toLowerCase()===pw.toLowerCase();
      const line=document.createElement('div');
      if(hit){
        line.className='hit';
        line.textContent=`[${i+1}] ✓ 命中！"${w}" — 類別：${CAT_LABEL[COM_CAT[w]]||'常見密碼'}`;
        log.appendChild(line);log.scrollTop=log.scrollHeight;found=true;
      }else{
        line.className='miss';line.textContent=`[${i+1}] ✗ "${w}"`;
        log.appendChild(line);
        if(log.children.length>100)log.removeChild(log.firstChild);
        log.scrollTop=log.scrollHeight;
      }
      const el=performance.now()-t0;
      S('cnt').textContent=i+1; S('time').textContent=Math.round(el);
      S('spd').textContent=el>0?Math.round((i+1)/(el/1000)).toLocaleString():'—';
      S('pct').textContent=Math.round((i+1)/dict.length*100)+'%';
      if(hit){
        clearInterval(daTimer);$('da-go').disabled=false;
        const th=i+1<=10?'🔴 極高':i+1<=30?'🟠 高':i+1<=80?'🟡 中':'🟢 低';
        S('rank').textContent='#'+(i+1);S('threat').textContent=th;
        const ck=COM_CAT[w]||'common';
        res.textContent=`⚠ 第 ${i+1} 筆命中！此密碼屬「${CAT_LABEL[ck]}」，極度危險`;
        res.className='da-res found';res.style.display='block';
        info.style.display='block';
        info.innerHTML=`<b style="color:#f87171">風險分析</b><br>類別：${CAT_LABEL[ck]}<br>字典排名：第 ${i+1} / ${dict.length} 筆<br>密碼長度：${pw.length} 碼（${pw.length<8?'⚠ 過短':'✓ 尚可'}）<br>字元多樣性：${ur}%<br>字元集大小：${cs} 種<br>熵值：${ent.toFixed(1)} bits（建議 > 60 bits）<br>理論破解時間：${ct}<br><b style="color:#fbbf24">建議：立即更換為含大小寫、數字、符號的 12 碼以上密碼</b>`;
        break;
      }
    }
    if(!found&&i>=dict.length){
      clearInterval(daTimer);$('da-go').disabled=false;
      const el=performance.now()-t0;
      S('time').textContent=Math.round(el);S('rank').textContent='未命中';S('pct').textContent='100%';S('threat').textContent='🟢 低';
      const line=document.createElement('div');
      line.style.color='#4ade80';line.textContent=`── 掃描完畢，比對 ${dict.length} 筆，未找到 ──`;
      log.appendChild(line);log.scrollTop=log.scrollHeight;
      res.textContent=`✓ 未在 ${dict.length} 筆字典中找到`;
      res.className='da-res safe';res.style.display='block';
      const{s}=calc(pw);
      info.style.display='block';
      info.innerHTML=`<b style="color:#4ade80">安全分析</b><br>未出現在常見密碼字典中 ✓<br>密碼長度：${pw.length} 碼（${pw.length>=12?'✓ 良好':pw.length>=8?'⚠ 建議延長至 12 碼':'✗ 過短'}）<br>字元多樣性：${ur}%<br>字元集大小：${cs} 種<br>熵值：${ent.toFixed(1)} bits（${ent>=60?'✓ 安全':ent>=40?'⚠ 尚可':'✗ 偏低'}）<br>理論破解時間：${ct}<br>強度評分：${s}/100（${s>=70?'強 ✓':s>=40?'中 ◑':'弱 ⚠'}）<br>${s<70?'<b style="color:#fbbf24">建議：加入大寫字母、數字與特殊符號來提升強度</b>':'<b style="color:#4ade80">此密碼強度良好，繼續保持</b>'}`;
    }
  },50);
}
</script>
